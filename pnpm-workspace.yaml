packages:
  - "."

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
