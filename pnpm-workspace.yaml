packages:
  - "."

# Install platform-specific native optional deps for both the CI/build host
# (Linux x64 glibc — Cloudflare Pages) and local dev (Darwin arm64/x64).
# Without this, pnpm skips @voidzero-dev/vite-plus-linux-x64-gnu on Linux and
# the `prepare` script (`vp config`) crashes with "Cannot find native binding".
supportedArchitectures:
  os:
    - linux
    - darwin
    - current
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - current

overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # Force vite-plus's internal hard-pinned @voidzero-dev/vite-plus-core dep to
  # match the top-level `vite` alias. Without this, pnpm installs two copies of
  # core (the alias version + vite-plus's pinned version) and the divergent
  # PluginOption types break `tsc --noEmit` in vite.config.ts.
  "@voidzero-dev/vite-plus-core": "^0.2.3"

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.3
  vitest: 4.1.10
  vite-plus: latest
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
