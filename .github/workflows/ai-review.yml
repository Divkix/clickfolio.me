# Copy this file to .github/workflows/ai-review.yml in your repo and add an
# LLM_API_KEY repository secret (your provider's key; DeepSeek by default).
# Reusable workflows can only DOWNGRADE the caller's permissions, never
# elevate them, so the caller job must grant a superset of every permission
# the reusable workflow's jobs request; each reusable job then narrows from
# these.
name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Fork PRs get no secrets (LLM_API_KEY would be empty), so skip
    # them; a collaborator can run /review on the PR instead.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      # contents:write is needed for the resolveReviewThread GraphQL mutation
      # (auto-resolving fixed threads); the review never pushes code.
      contents: write
      pull-requests: write
      issues: write
      security-events: write
    uses: divkix/ai-review/.github/workflows/review.yml@main
    # with:
    #   model: openai/gpt-5
    #   variant: high
    #   api_key_env: OPENAI_API_KEY
    secrets: inherit
