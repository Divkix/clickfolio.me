# Copy this file to .github/workflows/ai-review-commands.yml in your repo and
# add an LLM_API_KEY repository secret (your provider's key; DeepSeek by default).
# Enables /review, /review full, /plan, and /oc <task> comment commands.
name: AI Review Commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Share the concurrency group with push-triggered reviews so a /review
# command and a push review for the same PR don't run concurrently. No
# cancel-in-progress: never kill an in-flight review mid-post.
concurrency:
  group: ai-review-${{ github.event.issue.number || github.event.pull_request.number }}

jobs:
  commands:
    # Cheap pre-gate to avoid spawning workflows for unrelated comments. It
    # over-matches (e.g. '/oc' also matches '/october'); the route job's
    # line-anchored regex is the real filter.
    if: contains(github.event.comment.body, '/review') || contains(github.event.comment.body, '/plan') || contains(github.event.comment.body, '/oc')
    # Reusable workflows can only DOWNGRADE caller permissions, never elevate
    # them: this must be a superset of everything commands.yml's jobs (and
    # the nested review.yml) request, including oc's push access.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      id-token: write
    uses: divkix/ai-review/.github/workflows/commands.yml@main
    # with:
    #   model: openai/gpt-5
    #   variant: high
    #   api_key_env: OPENAI_API_KEY
    secrets: inherit
